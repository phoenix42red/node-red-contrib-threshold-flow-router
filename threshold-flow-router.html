<script type="text/javascript">
RED.nodes.registerType('threshold-flow-router',{
    category: 'function',
    color: '#c0deed',
    defaults: {
        name: {value:""},

        property: {value:"payload", required:true},
        propertyType: {value:"msg"},

        upper: {value:"10", required:true},
        upperType: {value:"num"},

        lower: {value:"0", required:true},
        lowerType: {value:"num"},

        hysteresis: {value:0},
        minDuration: {value:0},

        softStart: {value:true},
        debug: {value:false},
        alwaysPass: {value:false},

        colorHigh: {value:"#00AA00", required:true},
        colorMid: {value:"#FFCC00", required:true},
        colorLow: {value:"#FF0000", required:true}
    },
    inputs:1,
    outputs:3,
    outputLabels:["HIGH","MID","LOW"],
    icon:"font-awesome/fa-random",
    label: function() { return this.name || "threshold-flow-router"; }
});
</script>

<script type="text/html" data-template-name="threshold-flow-router">

<div class="form-row">
    <label>Name</label>
    <input type="text" data-config-name="name">
</div>

<div class="form-row">
    <label>Wert</label>
    <input type="text" data-config-name="property">
    <input type="hidden" data-config-name="propertyType">
</div>

<div class="form-row">
    <label>Obere Grenze</label>
    <input type="text" data-config-name="upper">
    <input type="hidden" data-config-name="upperType">
</div>

<div class="form-row">
    <label>Untere Grenze</label>
    <input type="text" data-config-name="lower">
    <input type="hidden" data-config-name="lowerType">
</div>

<div class="form-row">
    <label>Hysterese</label>
    <input type="number" data-config-name="hysteresis">
</div>

<div class="form-row">
    <label>Mindestverweildauer (ms)</label>
    <input type="number" data-config-name="minDuration">
</div>

<div class="form-row">
    <input type="checkbox" data-config-name="softStart">
    <label>Soft-Start</label>
</div>

<div class="form-row">
    <input type="checkbox" data-config-name="debug">
    <label>Debug aktivieren</label>
</div>

<div class="form-row">
    <input type="checkbox" data-config-name="alwaysPass">
    <label>Nachricht immer durchreichen</label>
</div>

<div class="form-row">
    <label>Farbe HIGH</label>
    <select data-config-name="colorHigh">
        <option value="#00AA00">Grün</option>
        <option value="#FFCC00">Gelb</option>
        <option value="#FF0000">Rot</option>
        <option value="#0000FF">Blau</option>
        <option value="#AAAAAA">Grau</option>
    </select>
</div>

<div class="form-row">
    <label>Farbe MID</label>
    <select data-config-name="colorMid">
        <option value="#00AA00">Grün</option>
        <option value="#FFCC00">Gelb</option>
        <option value="#FF0000">Rot</option>
        <option value="#0000FF">Blau</option>
        <option value="#AAAAAA">Grau</option>
    </select>
</div>

<div class="form-row">
    <label>Farbe LOW</label>
    <select data-config-name="colorLow">
        <option value="#00AA00">Grün</option>
        <option value="#FFCC00">Gelb</option>
        <option value="#FF0000">Rot</option>
        <option value="#0000FF">Blau</option>
        <option value="#AAAAAA">Grau</option>
    </select>
</div>

</script>
